<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="ProspectHub - Gestion complète de prospection web sur mobile">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProspectHub">
    
    <title>ProspectHub</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230f172a' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='%2306b6d4' text-anchor='middle' dominant-baseline='middle'>P</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230f172a' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='%2306b6d4' text-anchor='middle' dominant-baseline='middle'>P</text></svg>">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: white;
            overflow-x: hidden;
        }
        
        html, body, #root {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        input, textarea {
            -webkit-appearance: none;
            appearance: none;
            border-radius: 0.5rem;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            font-size: 16px; /* Empêche le zoom sur iOS */
        }
        
        button {
            -webkit-appearance: none;
            appearance: none;
        }
        
        /* Scrollbar personnalisée */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.5);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script>
        // Enregistrer le service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    
    <script>
        const { useState, useEffect } = React;
        
        // Import des icônes depuis Lucide
        const icons = {
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="18 15 12 9 6 15"></polyline></svg>,
            Edit2: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            MessageSquare: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Mail: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>,
            Phone: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            MapPin: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.9 14.9 0 0 1 10 4M12 2a14.9 14.9 0 0 0-10 4M2 12h20M12 2a14.9 14.9 0 0 1 10 4m-20 0a14.9 14.9 0 0 0 10 4"></path></svg>,
            Facebook: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        };

        const ProspectManager = () => {
            const [prospects, setProspects] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedId, setExpandedId] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [newMessage, setNewMessage] = useState('');
            const [formData, setFormData] = useState({
                company: '',
                contact: '',
                email: '',
                phone: '',
                address: '',
                hasWebsite: false,
                hasFacebook: false,
                notes: ''
            });

            // Charger depuis localStorage
            useEffect(() => {
                const saved = localStorage.getItem('prospects');
                if (saved) {
                    setProspects(JSON.parse(saved));
                }
            }, []);

            // Sauvegarder dans localStorage
            useEffect(() => {
                localStorage.setItem('prospects', JSON.stringify(prospects));
            }, [prospects]);

            const handleAddProspect = () => {
                if (!formData.company.trim()) return;
                
                const newProspect = {
                    id: Date.now(),
                    ...formData,
                    createdAt: new Date().toLocaleDateString('fr-FR'),
                    messages: []
                };

                setProspects([...prospects, newProspect]);
                setFormData({ company: '', contact: '', email: '', phone: '', address: '', hasWebsite: false, hasFacebook: false, notes: '' });
                setShowForm(false);
            };

            const handleUpdateProspect = (id) => {
                setProspects(prospects.map(p => 
                    p.id === id ? { ...p, ...formData } : p
                ));
                setEditingId(null);
                setFormData({ company: '', contact: '', email: '', phone: '', address: '', hasWebsite: false, hasFacebook: false, notes: '' });
            };

            const handleDeleteProspect = (id) => {
                setProspects(prospects.filter(p => p.id !== id));
                if (expandedId === id) setExpandedId(null);
            };

            const handleAddMessage = (id) => {
                if (!newMessage.trim()) return;

                setProspects(prospects.map(p => 
                    p.id === id 
                        ? {
                            ...p,
                            messages: [...(p.messages || []), {
                                id: Date.now(),
                                text: newMessage,
                                date: new Date().toLocaleDateString('fr-FR'),
                                time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
                            }]
                        }
                        : p
                ));
                setNewMessage('');
            };

            const filteredProspects = prospects.filter(p =>
                p.company.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.contact.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.email.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const startEdit = (prospect) => {
                setEditingId(prospect.id);
                setFormData({
                    company: prospect.company,
                    contact: prospect.contact,
                    email: prospect.email,
                    phone: prospect.phone,
                    address: prospect.address,
                    hasWebsite: prospect.hasWebsite,
                    hasFacebook: prospect.hasFacebook,
                    notes: prospect.notes
                });
                setExpandedId(prospect.id);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900" style={{ paddingBottom: '60px' }}>
                    {/* Header */}
                    <div className="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-sm border-b border-slate-700 shadow-lg safe-area-inset-top">
                        <div className="px-3 py-3 sm:px-4 sm:py-4">
                            <div className="flex items-center justify-between mb-3 gap-2">
                                <div>
                                    <h1 className="text-xl sm:text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                                        ProspectHub
                                    </h1>
                                    <p className="text-xs text-slate-400">Prospection mobile</p>
                                </div>
                                <button
                                    onClick={() => { setShowForm(!showForm); setEditingId(null); }}
                                    className="flex items-center gap-1 sm:gap-2 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white px-3 sm:px-4 py-2 rounded-lg font-semibold transition-all shadow-lg text-sm sm:text-base flex-shrink-0"
                                >
                                    <icons.Plus /> <span className="hidden sm:inline">Nouveau</span>
                                </button>
                            </div>

                            {/* Barre de recherche */}
                            <div className="relative">
                                <icons.Search className="absolute left-3 top-2.5 text-slate-400" style={{ width: '18px', height: '18px' }} />
                                <input
                                    type="text"
                                    placeholder="Chercher..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 text-sm"
                                />
                            </div>
                        </div>
                    </div>

                    {/* Formulaire */}
                    {showForm && (
                        <div className="px-3 sm:px-4 py-4">
                            <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl">
                                <h2 className="text-lg font-bold text-white mb-4">Nouveau prospect</h2>
                                
                                <div className="space-y-3 mb-4">
                                    <input
                                        type="text"
                                        placeholder="Entreprise *"
                                        value={formData.company}
                                        onChange={(e) => setFormData({...formData, company: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Contact"
                                        value={formData.contact}
                                        onChange={(e) => setFormData({...formData, contact: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="email"
                                        placeholder="Email"
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="tel"
                                        placeholder="Téléphone"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({...formData, phone: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Adresse"
                                        value={formData.address}
                                        onChange={(e) => setFormData({...formData, address: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                </div>

                                <div className="flex flex-col gap-2 mb-4 text-sm">
                                    <label className="flex items-center gap-2 text-white cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={formData.hasWebsite}
                                            onChange={(e) => setFormData({...formData, hasWebsite: e.target.checked})}
                                            className="w-4 h-4 rounded accent-cyan-500"
                                        />
                                        <icons.Globe style={{ width: '14px', height: '14px' }} /> Site web
                                    </label>
                                    <label className="flex items-center gap-2 text-white cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={formData.hasFacebook}
                                            onChange={(e) => setFormData({...formData, hasFacebook: e.target.checked})}
                                            className="w-4 h-4 rounded accent-cyan-500"
                                        />
                                        <icons.Facebook style={{ width: '14px', height: '14px' }} /> Facebook
                                    </label>
                                </div>

                                <textarea
                                    placeholder="Notes"
                                    value={formData.notes}
                                    onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                    className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 mb-4 resize-none text-sm"
                                    rows="2"
                                />

                                <div className="flex gap-2">
                                    <button
                                        onClick={handleAddProspect}
                                        className="flex-1 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white px-3 py-2 rounded-lg font-semibold transition-all text-sm"
                                    >
                                        Ajouter
                                    </button>
                                    <button
                                        onClick={() => setShowForm(false)}
                                        className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold transition-all text-sm"
                                    >
                                        Annuler
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Formulaire d'édition */}
                    {editingId && (
                        <div className="px-3 sm:px-4 py-4">
                            <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl">
                                <h2 className="text-lg font-bold text-white mb-4">Éditer</h2>
                                
                                <div className="space-y-3 mb-4">
                                    <input
                                        type="text"
                                        placeholder="Entreprise"
                                        value={formData.company}
                                        onChange={(e) => setFormData({...formData, company: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Contact"
                                        value={formData.contact}
                                        onChange={(e) => setFormData({...formData, contact: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="email"
                                        placeholder="Email"
                                        value={formData.email}
                                        onChange={(e) => setFormData({...formData, email: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="tel"
                                        placeholder="Téléphone"
                                        value={formData.phone}
                                        onChange={(e) => setFormData({...formData, phone: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                    <input
                                        type="text"
                                        placeholder="Adresse"
                                        value={formData.address}
                                        onChange={(e) => setFormData({...formData, address: e.target.value})}
                                        className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-sm"
                                    />
                                </div>

                                <div className="flex flex-col gap-2 mb-4 text-sm">
                                    <label className="flex items-center gap-2 text-white cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={formData.hasWebsite}
                                            onChange={(e) => setFormData({...formData, hasWebsite: e.target.checked})}
                                            className="w-4 h-4 rounded accent-cyan-500"
                                        />
                                        <icons.Globe style={{ width: '14px', height: '14px' }} /> Site web
                                    </label>
                                    <label className="flex items-center gap-2 text-white cursor-pointer">
                                        <input
                                            type="checkbox"
                                            checked={formData.hasFacebook}
                                            onChange={(e) => setFormData({...formData, hasFacebook: e.target.checked})}
                                            className="w-4 h-4 rounded accent-cyan-500"
                                        />
                                        <icons.Facebook style={{ width: '14px', height: '14px' }} /> Facebook
                                    </label>
                                </div>

                                <textarea
                                    placeholder="Notes"
                                    value={formData.notes}
                                    onChange={(e) => setFormData({...formData, notes: e.target.value})}
                                    className="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 mb-4 resize-none text-sm"
                                    rows="2"
                                />

                                <div className="flex gap-2">
                                    <button
                                        onClick={() => handleUpdateProspect(editingId)}
                                        className="flex-1 bg-gradient-to-r from-green-500 to-emerald-500 hover:from-green-600 hover:to-emerald-600 text-white px-3 py-2 rounded-lg font-semibold transition-all text-sm"
                                    >
                                        Enregistrer
                                    </button>
                                    <button
                                        onClick={() => setEditingId(null)}
                                        className="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg font-semibold transition-all text-sm"
                                    >
                                        Annuler
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Liste des prospects */}
                    <div className="px-3 sm:px-4 py-4">
                        {filteredProspects.length === 0 ? (
                            <div className="text-center py-12">
                                <p className="text-slate-400 text-base">Aucun prospect</p>
                                <p className="text-slate-500 text-xs mt-2">Commencez par en ajouter un</p>
                            </div>
                        ) : (
                            <div className="space-y-2">
                                {filteredProspects.map(prospect => (
                                    <div
                                        key={prospect.id}
                                        className="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden shadow-md"
                                    >
                                        {/* En-tête */}
                                        <div
                                            onClick={() => setExpandedId(expandedId === prospect.id ? null : prospect.id)}
                                            className="p-3 cursor-pointer hover:bg-slate-750 transition-colors flex items-start justify-between gap-2"
                                        >
                                            <div className="flex-1 min-w-0">
                                                <h3 className="font-bold text-white text-base truncate">{prospect.company}</h3>
                                                {prospect.contact && <p className="text-slate-400 text-xs truncate">{prospect.contact}</p>}
                                                
                                                <div className="flex gap-2 mt-1.5 flex-wrap">
                                                    {prospect.hasWebsite && (
                                                        <span className="flex items-center gap-1 bg-blue-500/20 text-blue-300 text-xs px-2 py-0.5 rounded-full flex-shrink-0">
                                                            <icons.Globe style={{ width: '12px', height: '12px' }} /> Web
                                                        </span>
                                                    )}
                                                    {prospect.hasFacebook && (
                                                        <span className="flex items-center gap-1 bg-blue-600/20 text-blue-300 text-xs px-2 py-0.5 rounded-full flex-shrink-0">
                                                            <icons.Facebook style={{ width: '12px', height: '12px' }} /> FB
                                                        </span>
                                                    )}
                                                </div>
                                            </div>

                                            <div className="flex gap-1.5 ml-2 flex-shrink-0">
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); startEdit(prospect); }}
                                                    className="p-2 hover:bg-slate-700 rounded-lg text-slate-300 hover:text-blue-400 transition-colors"
                                                >
                                                    <icons.Edit2 />
                                                </button>
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); handleDeleteProspect(prospect.id); }}
                                                    className="p-2 hover:bg-slate-700 rounded-lg text-slate-300 hover:text-red-400 transition-colors"
                                                >
                                                    <icons.Trash2 />
                                                </button>
                                                <button
                                                    onClick={(e) => { e.stopPropagation(); }}
                                                    className="p-2 text-slate-400"
                                                >
                                                    {expandedId === prospect.id ? <icons.ChevronUp /> : <icons.ChevronDown />}
                                                </button>
                                            </div>
                                        </div>

                                        {/* Détails développés */}
                                        {expandedId === prospect.id && (
                                            <div className="border-t border-slate-700 bg-slate-750 p-3 space-y-3">
                                                {/* Infos de contact */}
                                                <div className="space-y-2">
                                                    {prospect.email && (
                                                        <div className="flex items-start gap-2">
                                                            <icons.Mail className="text-cyan-400 mt-0.5 flex-shrink-0" style={{ width: '16px', height: '16px' }} />
                                                            <div className="min-w-0">
                                                                <p className="text-xs text-slate-400">Email</p>
                                                                <a href={`mailto:${prospect.email}`} className="text-white hover:text-cyan-400 break-all text-sm">{prospect.email}</a>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {prospect.phone && (
                                                        <div className="flex items-start gap-2">
                                                            <icons.Phone className="text-cyan-400 mt-0.5 flex-shrink-0" style={{ width: '16px', height: '16px' }} />
                                                            <div>
                                                                <p className="text-xs text-slate-400">Téléphone</p>
                                                                <a href={`tel:${prospect.phone}`} className="text-white hover:text-cyan-400 text-sm">{prospect.phone}</a>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {prospect.address && (
                                                        <div className="flex items-start gap-2">
                                                            <icons.MapPin className="text-cyan-400 mt-0.5 flex-shrink-0" style={{ width: '16px', height: '16px' }} />
                                                            <div>
                                                                <p className="text-xs text-slate-400">Adresse</p>
                                                                <p className="text-white text-sm">{prospect.address}</p>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>

                                                {prospect.notes && (
                                                    <div className="bg-slate-800 rounded-lg p-2.5 border border-slate-700">
                                                        <p className="text-xs text-slate-400 mb-1">Notes</p>
                                                        <p className="text-slate-200 text-xs">{prospect.notes}</p>
                                                    </div>
                                                )}

                                                {/* Historique des échanges */}
                                                <div className="border-t border-slate-700 pt-3">
                                                    <h4 className="font-semibold text-white flex items-center gap-2 mb-2 text-sm">
                                                        <icons.MessageSquare className="text-cyan-400" style={{ width: '16px', height: '16px' }} />
                                                        Échanges
                                                    </h4>

                                                    <div className="space-y-1.5 mb-2.5 max-h-40 overflow-y-auto bg-slate-800/50 rounded-lg p-2">
                                                        {(!prospect.messages || prospect.messages.length === 0) ? (
                                                            <p className="text-slate-500 text-xs italic">Aucun échange</p>
                                                        ) : (
                                                            prospect.messages.map(msg => (
                                                                <div key={msg.id} className="bg-slate-700/50 rounded-lg p-2 border-l-2 border-cyan-400">
                                                                    <p className="text-white text-xs break-words">{msg.text}</p>
                                                                    <p className="text-xs text-slate-400 mt-0.5">{msg.date} {msg.time}</p>
                                                                </div>
                                                            ))
                                                        )}
                                                    </div>

                                                    <div className="flex gap-2">
                                                        <input
                                                            type="text"
                                                            placeholder="Note..."
                                                            value={newMessage}
                                                            onChange={(e) => setNewMessage(e.target.value)}
                                                            onKeyPress={(e) => e.key === 'Enter' && handleAddMessage(prospect.id)}
                                                            className="flex-1 bg-slate-700 border border-slate-600 rounded-lg px-2 py-1.5 text-white placeholder-slate-400 focus:outline-none focus:border-cyan-500 text-xs"
                                                        />
                                                        <button
                                                            onClick={() => handleAddMessage(prospect.id)}
                                                            className="bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-600 hover:to-blue-600 text-white px-2.5 py-1.5 rounded-lg transition-all font-semibold text-sm flex-shrink-0"
                                                        >
                                                            +
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Footer compteur */}
                    <div className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 py-2 safe-area-inset-bottom text-center">
                        <p className="text-slate-400 text-xs">{filteredProspects.length} prospect{filteredProspects.length !== 1 ? 's' : ''}</p>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ProspectManager />, document.getElementById('root'));
    </script>
</body>
</html>
